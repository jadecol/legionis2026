#   PROYECTO 2026 — Abelardo De La Espriella
#   Configuración Netlify
# ============================================================

[build]
  publish = "."          # La raíz del proyecto ES el sitio

# ── Cabeceras de seguridad ───────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Protección XSS y clickjacking
    X-Frame-Options           = "SAMEORIGIN"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"

    # Política de contenido — permite Google Fonts, Tabler, Netlify
    Content-Security-Policy   = """
      default-src 'self';
      script-src  'self' 'unsafe-inline';
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
      font-src    'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
      img-src     'self' data: https:;
      connect-src 'self' https://api.anthropic.com;
    """

    # HSTS — fuerza HTTPS por 1 año (activar solo cuando el dominio esté listo)
    # Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Cache de assets estáticos (CSS, JS, fuentes) ────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"   # 30 días para imágenes y logo

# ── Redireccionamiento cuando llegue el dominio ──────────────
# Descomenta estas líneas cuando apuntes TU_DOMINIO.com
# [[redirects]]
#   from  = "https://www.TU_DOMINIO.com/*"
#   to    = "https://TU_DOMINIO.com/:splat"
#   status = 301

# ── Página de error personalizada ───────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
